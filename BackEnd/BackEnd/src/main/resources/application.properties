spring.application.name=PCF
server.port=8080
# Disable Spring's JMX exposure (prevents some RMI port activity)
spring.jmx.enabled=false
# Disable Spring application admin (avoids additional JMX registration)
spring.application.admin.enabled=false

# Include full error messages in responses (useful for debugging local dev)
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Logging tweaks for debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO
# Configuração do banco PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:3000/PCF
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=02022006
# Dialeto e comportamento do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
# Mostrar as consultas SQL no console para depução
spring.jpa.show-sql=true
# Configuração do dialeto para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect